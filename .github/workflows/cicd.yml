name: Canine Vision CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  # JOB 1: run tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code with LFS
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Download Git LFS files
      run: |
        git lfs install
        git lfs pull

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        python tests/test_inference.py

  # JOB 2: Build AND Push to DockerHub
  build:
    name: Build & Push to DockerHub
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: LFS files
      run: |
        git lfs install
        git lfs pull
        ls -lh artefacts/checkpoints || true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        no-cache: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/canine-vision:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/canine-vision:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

